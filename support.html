<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScreenBuddy Support</title>
  <meta name="description" content="Get help with ScreenBuddy setup." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="support">
    <nav class="topbar" aria-label="Main navigation">
      <a class="brand" href="/">
        <img src="assets/pesto.png" alt="" />
        <span>ScreenBuddy</span>
      </a>
      <a class="support-link" href="/">Download</a>
    </nav>

    <section class="support-card">
      <div class="sad-pesto" aria-hidden="true">
        <img src="assets/pesto.png" alt="" />
        <span>:(</span>
      </div>
      <div>
        <p class="kicker">Setup help</p>
        <h1>Pesto already filled in what went wrong.</h1>
        <p class="lede">Enter your email and submit. The setup error, platform, and app version are already attached.</p>
      </div>

      <form id="supportForm" class="support-form" action="https://formsubmit.co/support@orbitboyzz.me" method="POST">
        <input type="hidden" name="_subject" value="ScreenBuddy setup help" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" id="platformField" name="platform" />
        <input type="hidden" id="versionField" name="version" />
        <input type="hidden" id="errorField" name="setup_error" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required autofocus />

        <label for="details">What went wrong</label>
        <textarea id="details" name="details" readonly></textarea>

        <button class="download" type="submit">Send help request</button>
        <p class="fineprint">Press Enter after typing your email, or click the button.</p>
      </form>
    </section>
  </main>
  <script src="support.js"></script>
</body>
</html>
